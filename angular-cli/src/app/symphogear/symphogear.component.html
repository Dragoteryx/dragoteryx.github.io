<span>Did you know that I like Symphogear?</span>
<table class="display">
  <tr *ngFor="let gearlign of gears">
    <td *ngFor="let gear of gearlign">
      <div class="cadre" (mouseenter)="pulse($event)">
        <img src="{{gear.thumb}}">
        <p>{{gear.chant}}</p>
      </div>
    </td>
  </tr>
</table>
